<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapılacaklar Listesi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Auth Ekranı -->
    <div class="auth-wrapper" id="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 11l3 3L22 4"/>
                        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                    </svg>
                </div>
                <h1 id="auth-title">Hos Geldiniz</h1>
                <p class="auth-subtitle" id="auth-subtitle">Devam etmek icin giris yapın</p>
            </div>
            <div id="auth-message" class="auth-message" style="display:none;"></div>
            <form id="auth-form">
                <div class="input-group">
                    <label for="auth-email">E-posta</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="M22 7l-8.97 5.7a1.94 1.94 0 01-2.06 0L2 7"/>
                        </svg>
                        <input type="email" id="auth-email" placeholder="ornek@email.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="auth-password">Sifre</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                        <input type="password" id="auth-password" placeholder="Min 6 karakter" minlength="6" required>
                    </div>
                </div>
                <button type="submit" id="auth-submit-btn">
                    <span id="auth-btn-text">Giris Yap</span>
                    <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>
            <div class="auth-divider">
                <span>veya</span>
            </div>
            <p class="auth-toggle">
                <span id="auth-toggle-text">Hesabınız yok mu?</span>
                <a href="#" id="auth-toggle-link">Kayıt Ol</a>
            </p>
        </div>
    </div>

    <!-- Todo Ekranı -->
    <div class="container" id="todo-container" style="display:none;">
        <div class="header-row">
            <h1>Yapılacaklar Listesi</h1>
            <button id="logout-btn">Çıkış</button>
        </div>
        <p id="user-email" class="user-email"></p>
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="Yeni görev ekle..." autocomplete="off">
            <button type="submit">Ekle</button>
        </form>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Tümü</button>
            <button class="filter-btn" data-filter="active">Aktif</button>
            <button class="filter-btn" data-filter="completed">Tamamlanan</button>
        </div>
        <ul id="todo-list"></ul>
        <div class="footer">
            <span id="todo-count">0 görev</span>
            <button id="clear-completed">Tamamlananları Temizle</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
